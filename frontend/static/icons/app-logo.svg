<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="#0a0a0a" stroke="#d4af37" stroke-width="8"/>
  
  <!-- Inner Circle -->
  <circle cx="256" cy="256" r="200" fill="#1a1610" stroke="#d4af37" stroke-width="4"/>
  
  <!-- Traffic Lines Grid -->
  <g stroke="#d4af37" stroke-width="3" fill="none">
    <!-- Horizontal lines -->
    <line x1="100" y1="200" x2="412" y2="200" opacity="0.8"/>
    <line x1="100" y1="256" x2="412" y2="256" opacity="0.8"/>
    <line x1="100" y1="312" x2="412" y2="312" opacity="0.8"/>
    
    <!-- Vertical lines -->
    <line x1="180" y1="140" x2="180" y2="372" opacity="0.8"/>
    <line x1="256" y1="140" x2="256" y2="372" opacity="0.8"/>
    <line x1="332" y1="140" x2="332" y2="372" opacity="0.8"/>
  </g>
  
  <!-- AI Brain Core -->
  <circle cx="256" cy="256" r="60" fill="#d4af37" opacity="0.9"/>
  <circle cx="256" cy="256" r="45" fill="#0a0a0a"/>
  
  <!-- Brain Pattern -->
  <g fill="#d4af37" opacity="0.8">
    <circle cx="240" cy="240" r="4"/>
    <circle cx="272" cy="240" r="4"/>
    <circle cx="240" cy="272" r="4"/>
    <circle cx="272" cy="272" r="4"/>
    <circle cx="256" cy="256" r="6"/>
  </g>
  
  <!-- Neural Connections -->
  <g stroke="#d4af37" stroke-width="2" fill="none" opacity="0.6">
    <path d="M256,256 L180,200"/>
    <path d="M256,256 L332,200"/>
    <path d="M256,256 L180,312"/>
    <path d="M256,256 L332,312"/>
    <path d="M256,256 L200,140"/>
    <path d="M256,256 L312,140"/>
    <path d="M256,256 L200,372"/>
    <path d="M256,256 L312,372"/>
  </g>
  
  <!-- App Name -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#d4af37" text-anchor="middle">TRAFFICSENSE</text>
  <text x="256" y="470" font-family="Arial, sans-serif" font-size="24" fill="#d4af37" text-anchor="middle" opacity="0.8">AI</text>
</svg>
